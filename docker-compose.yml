services:
  traefik:
    image: traefik:v3.2
    command:
      - --api.dashboard=true
      - --providers.file.filename=/etc/traefik/dynamic.yml
      - --providers.file.watch=true
      - --entrypoints.web.address=:${TRAEFIK_PORT:-3000}
    ports:
      - "${TRAEFIK_PORT:-3000}:${TRAEFIK_PORT:-3000}"
    volumes:
      - ./infra/traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-issue_bridge}
      POSTGRES_USER: ${POSTGRES_USER:-issue_bridge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-issue_bridge}
      INIT_ADMIN_EMAIL: ${INIT_ADMIN_EMAIL:-admin@example.com}
      INIT_ADMIN_PASSWORD: ${INIT_ADMIN_PASSWORD:-admin1234}
      INIT_ADMIN_FULL_NAME: ${INIT_ADMIN_FULL_NAME:-Default Admin}
    volumes:
      - ${POSTGRES_DATA_DIR:-./.data/postgres}:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-issue_bridge} -d ${POSTGRES_DB:-issue_bridge}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-issue_bridge}:${POSTGRES_PASSWORD:-issue_bridge}@postgres:5432/${POSTGRES_DB:-issue_bridge}
      RUST_LOG: ${RUST_LOG:-info}
      API_PORT: ${API_PORT:-8080}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:3000}
      PUBLIC_FRONTEND_URL: ${PUBLIC_FRONTEND_URL:-http://localhost:3000}
      SECRET_ENCRYPTION_KEY: ${SECRET_ENCRYPTION_KEY:-}
      ATTACHMENTS_DATA_DIR: /var/lib/issuehub/attachments
      ATTACHMENT_CACHE_DIR: ${ATTACHMENT_CACHE_DIR:-/var/cache/issuehub/gitlab-attachments}
      TEMP_UPLOAD_RETENTION_HOURS: ${TEMP_UPLOAD_RETENTION_HOURS:-24}
      WORKER_HEARTBEAT_INTERVAL_SECONDS: ${WORKER_HEARTBEAT_INTERVAL_SECONDS:-15}
      WORKER_STALE_AFTER_SECONDS: ${WORKER_STALE_AFTER_SECONDS:-60}
      QUEUE_STALE_AFTER_SECONDS: ${QUEUE_STALE_AFTER_SECONDS:-300}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
      DEBUG: ${DEBUG:-false}
      REQUIRE_SECRET_ENCRYPTION_KEY: ${REQUIRE_SECRET_ENCRYPTION_KEY:-false}
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-true}
      RATE_LIMIT_WINDOW_SECONDS: ${RATE_LIMIT_WINDOW_SECONDS:-900}
      RATE_LIMIT_LOGIN_PER_EMAIL: ${RATE_LIMIT_LOGIN_PER_EMAIL:-5}
      RATE_LIMIT_LOGIN_PER_IP: ${RATE_LIMIT_LOGIN_PER_IP:-50}
      RATE_LIMIT_PASSWORD_RECOVERY_PER_EMAIL: ${RATE_LIMIT_PASSWORD_RECOVERY_PER_EMAIL:-3}
      RATE_LIMIT_PASSWORD_RECOVERY_PER_IP: ${RATE_LIMIT_PASSWORD_RECOVERY_PER_IP:-20}
      RATE_LIMIT_INVITATION_RESEND_PER_ADMIN: ${RATE_LIMIT_INVITATION_RESEND_PER_ADMIN:-10}
      RATE_LIMIT_UPLOADS_PER_USER: ${RATE_LIMIT_UPLOADS_PER_USER:-60}
      UPLOAD_MAX_BYTES: ${UPLOAD_MAX_BYTES:-10485760}
      UPLOAD_ALLOWED_CONTENT_TYPES: ${UPLOAD_ALLOWED_CONTENT_TYPES:-image/png,image/jpeg,image/gif,image/webp,application/pdf,text/plain,text/csv,application/json,application/zip}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-no-reply@localhost}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-IssueHub}
      SMTP_STARTTLS: ${SMTP_STARTTLS:-true}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ${ATTACHMENTS_HOST_DIR:-./.data/attachments}:/var/lib/issuehub/attachments

  worker:
    build:
      context: .
      dockerfile: services/worker/Dockerfile
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-issue_bridge}:${POSTGRES_PASSWORD:-issue_bridge}@postgres:5432/${POSTGRES_DB:-issue_bridge}
      RUST_LOG: ${RUST_LOG:-info}
      PUBLIC_FRONTEND_URL: ${PUBLIC_FRONTEND_URL:-http://localhost:3000}
      SECRET_ENCRYPTION_KEY: ${SECRET_ENCRYPTION_KEY:-}
      ATTACHMENTS_DATA_DIR: /var/lib/issuehub/attachments
      ATTACHMENT_CACHE_DIR: ${ATTACHMENT_CACHE_DIR:-/var/cache/issuehub/gitlab-attachments}
      TEMP_UPLOAD_RETENTION_HOURS: ${TEMP_UPLOAD_RETENTION_HOURS:-24}
      WORKER_HEARTBEAT_INTERVAL_SECONDS: ${WORKER_HEARTBEAT_INTERVAL_SECONDS:-15}
      WORKER_STALE_AFTER_SECONDS: ${WORKER_STALE_AFTER_SECONDS:-60}
      QUEUE_STALE_AFTER_SECONDS: ${QUEUE_STALE_AFTER_SECONDS:-300}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
      DEBUG: ${DEBUG:-false}
      REQUIRE_SECRET_ENCRYPTION_KEY: ${REQUIRE_SECRET_ENCRYPTION_KEY:-false}
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-true}
      RATE_LIMIT_WINDOW_SECONDS: ${RATE_LIMIT_WINDOW_SECONDS:-900}
      RATE_LIMIT_LOGIN_PER_EMAIL: ${RATE_LIMIT_LOGIN_PER_EMAIL:-5}
      RATE_LIMIT_LOGIN_PER_IP: ${RATE_LIMIT_LOGIN_PER_IP:-50}
      RATE_LIMIT_PASSWORD_RECOVERY_PER_EMAIL: ${RATE_LIMIT_PASSWORD_RECOVERY_PER_EMAIL:-3}
      RATE_LIMIT_PASSWORD_RECOVERY_PER_IP: ${RATE_LIMIT_PASSWORD_RECOVERY_PER_IP:-20}
      RATE_LIMIT_INVITATION_RESEND_PER_ADMIN: ${RATE_LIMIT_INVITATION_RESEND_PER_ADMIN:-10}
      RATE_LIMIT_UPLOADS_PER_USER: ${RATE_LIMIT_UPLOADS_PER_USER:-60}
      UPLOAD_MAX_BYTES: ${UPLOAD_MAX_BYTES:-10485760}
      UPLOAD_ALLOWED_CONTENT_TYPES: ${UPLOAD_ALLOWED_CONTENT_TYPES:-image/png,image/jpeg,image/gif,image/webp,application/pdf,text/plain,text/csv,application/json,application/zip}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-no-reply@localhost}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-IssueHub}
      SMTP_STARTTLS: ${SMTP_STARTTLS:-true}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ${ATTACHMENTS_HOST_DIR:-./.data/attachments}:/var/lib/issuehub/attachments

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - api
